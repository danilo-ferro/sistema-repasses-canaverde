<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Repasses — Atendimento · Canaverde &amp; Aguiar Advogados</title>
<style>
:root{
  --surface:#ffffff;--surface2:#f7f9fb;--thead-bg:#f4f6f9;
  --txt:#2a2f36;--txt2:#555c64;--txt3:#7a828b;
  --hover:#fafbfc;--hover2:#eef0f3;--pago-hover:#e9fbef;
  --azul:#1a3a5c;--azul2:#2d6a9f;--azul-cl:#eaf2fa;
  --verde:#1f8a4c;--verde-bg:#e6f6ec;
  --laranja:#b5580a;--laranja-bg:#fdf0e3;
  --marrom:#7b3f00;--marrom-bg:#fce4d6;
  --roxo:#6a2d9f;--roxo-bg:#f0e6fa;
  --rosa:#8b2252;--rosa-bg:#fbe9f1;
  --vermelho:#c0392b;--vermelho-bg:#fdecea;
  --amarelo:#9a7400;--amarelo-bg:#fff6df;
  --cinza:#f0f2f5;--borda:#e2e6ea;--cinza2:#f8f9fb;
  --pago-bg:#f0fdf4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--cinza);color:var(--txt);min-height:100vh;font-size:14px}
.mono{font-family:'SF Mono','Consolas','Roboto Mono',monospace}
button{font-family:inherit}

/* HEADER */
header{background:linear-gradient(135deg,#16314e,#2d6a9f);color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 3px 10px rgba(0,0,0,.18);position:sticky;top:0;z-index:40}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.3);object-fit:cover;display:block;flex:none}
.brand h1{font-size:16px;font-weight:700;line-height:1.15}
.brand .sub{font-size:11px;opacity:.8;font-weight:500}
.hbtns{display:flex;gap:7px;flex-wrap:wrap}
.hbtn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.32);color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.26)}
.hbtn.add{background:rgba(31,138,76,.55);border-color:rgba(31,138,76,.7)}
.hbtn svg{width:14px;height:14px}

/* STATS */
.stats{display:flex;gap:10px;padding:13px 22px;background:var(--surface);border-bottom:1px solid var(--borda);flex-wrap:wrap;overflow-x:auto}
.sc{display:flex;flex-direction:column;justify-content:center;background:var(--cinza2);border:1px solid var(--borda);border-radius:10px;padding:9px 15px;min-width:120px}
.sc .sv{font-size:20px;font-weight:800;line-height:1.1;color:var(--azul)}
.sc .sl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;font-weight:600}
.sc.money .sv{color:var(--vermelho)}
.sc.ok .sv{color:var(--verde)}
.sc.cp .sv{color:var(--vermelho)}

/* CONTROLS */
.controls{background:var(--surface);border-bottom:1px solid var(--borda);padding:11px 22px;display:flex;flex-direction:column;gap:9px;position:sticky;top:62px;z-index:30}
.crow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.clabel{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.search{display:flex;align-items:center;background:var(--cinza2);border:1px solid var(--borda);border-radius:9px;padding:7px 12px;gap:7px;flex:1;min-width:210px;max-width:380px}
.search input{border:none;background:transparent;outline:none;font-size:13px;width:100%;color:var(--txt)}
.search svg{width:15px;height:15px;color:var(--txt3);flex-shrink:0}
.chip{padding:6px 13px;border:1px solid var(--borda);border-radius:20px;background:var(--cinza2);cursor:pointer;font-size:12px;font-weight:600;color:var(--txt2);transition:.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.chip:hover{background:var(--hover2)}
.chip .ct{background:var(--surface);border:1px solid var(--borda);border-radius:10px;padding:0 6px;font-size:10px;color:#777;font-weight:700}
.chip.on{border-color:var(--azul2);background:var(--azul2);color:#fff}
.chip.on .ct{background:rgba(255,255,255,.25);border-color:transparent;color:#fff}
.chip.on.max{background:var(--azul);border-color:var(--azul)}
.chip.on.mariah{background:var(--rosa);border-color:var(--rosa)}
.chip.on.jezieli{background:var(--roxo);border-color:var(--roxo)}
.chip.on.yunes{background:var(--verde);border-color:var(--verde)}
.chip.on.kaled{background:#0d7373;border-color:#0d7373}
.chip.on.nardon{background:var(--marrom);border-color:var(--marrom)}
.chip.on.jlm{background:#5a4ad1;border-color:#5a4ad1}
.chip.on.me{background:var(--laranja);border-color:var(--laranja)}
.chip.on.cp{background:var(--vermelho);border-color:var(--vermelho)}
.seg{display:inline-flex;border:1px solid var(--borda);border-radius:9px;overflow:hidden}
.seg button{border:none;background:var(--surface);padding:7px 13px;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer}
.seg button.on{background:var(--azul2);color:#fff}
select{border:1px solid var(--borda);border-radius:8px;padding:7px 9px;font-size:12px;background:var(--surface);color:var(--txt2);cursor:pointer;font-weight:600}

/* TABLE */
.wrap{padding:14px 22px 60px}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
thead th{background:var(--thead-bg);color:var(--txt3);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;text-align:left;padding:11px 10px;border-bottom:2px solid var(--borda);white-space:nowrap;cursor:pointer;user-select:none}
thead th.nosort{cursor:default}
thead th .arr{opacity:.35;font-size:9px;margin-left:2px}
tbody td{padding:10px;border-bottom:1px solid var(--borda);vertical-align:middle;font-size:13px}
tbody tr:hover{background:var(--hover)}
tbody tr.pago{background:var(--pago-bg)}
tbody tr.pago:hover{background:var(--pago-hover)}
.cli{font-weight:600;color:var(--txt)}
.cli .obsdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amarelo);margin-left:6px;vertical-align:middle}
.cpf{font-size:12px;color:var(--txt3)}
.proc{font-size:11.5px;color:var(--txt2);white-space:nowrap}
.reu{font-size:12px;color:var(--txt2)}
.copy{border:none;background:transparent;cursor:pointer;color:var(--txt3);padding:2px;vertical-align:middle}
.copy:hover{color:var(--azul2)}
.copy svg{width:12px;height:12px}
.gtag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}
.g-max{background:var(--azul-cl);color:var(--azul)}
.g-mariah{background:var(--rosa-bg);color:var(--rosa)}
.g-jezieli{background:var(--roxo-bg);color:var(--roxo)}
.g-yunes{background:var(--verde-bg);color:var(--verde)}
.g-kaled{background:#d8f0f0;color:#0d7373}
.g-nardon{background:var(--marrom-bg);color:var(--marrom)}
.g-jlm{background:#e7e4fb;color:#5a4ad1}
.g-me{background:var(--laranja-bg);color:var(--laranja)}
.val{font-weight:700;color:var(--txt);white-space:nowrap;text-align:right}
.ag{display:inline-block;padding:2px 9px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap}
.ag.verde{background:var(--verde-bg);color:var(--verde)}
.ag.amarelo{background:var(--amarelo-bg);color:var(--amarelo)}
.ag.laranja{background:var(--laranja-bg);color:var(--laranja)}
.ag.vermelho{background:var(--vermelho-bg);color:var(--vermelho)}
.cpbox{width:18px;height:18px;cursor:pointer;accent-color:var(--vermelho)}
.stbtn{border:1px solid var(--borda);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.stbtn.pend{background:var(--vermelho-bg);color:var(--vermelho);border-color:#f3c9c4}
.stbtn.pago{background:var(--verde-bg);color:var(--verde);border-color:#bfe6cd}
.acts{display:flex;gap:4px;justify-content:flex-end}
.ico{border:none;background:transparent;cursor:pointer;color:var(--txt3);padding:5px;border-radius:6px}
.ico:hover{background:var(--hover2);color:var(--azul2)}
.ico.del:hover{color:var(--vermelho)}
.ico svg{width:15px;height:15px}
.exp{padding:0!important;border:none!important}
.expbox{background:var(--surface2);border-left:3px solid var(--azul2);padding:13px 16px;margin:0;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld textarea,.fld select{border:1px solid var(--borda);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--txt)}
.fld textarea{min-width:260px;min-height:38px;resize:vertical}
.fld input[type=date]{min-width:150px}
.fld .vin{width:130px}
.savep{background:var(--verde);color:#fff;border:none;border-radius:8px;padding:8px 15px;font-size:12px;font-weight:700;cursor:pointer}
.savep:hover{background:#19763f}

/* CARDS (consolidado) */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px}
.card{background:var(--surface);border:1px solid var(--borda);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-h{padding:13px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer}
.card-h:hover{background:var(--cinza2)}
.card-h .nm{font-weight:700;color:var(--txt);font-size:14px;line-height:1.25}
.card-h .cf{font-size:11.5px;color:var(--txt3);margin-top:3px}
.card-h .tot{font-size:17px;font-weight:800;color:var(--vermelho);white-space:nowrap}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;padding:0 15px 12px}
.bdg{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
.bdg.proc{background:var(--azul-cl);color:var(--azul)}
.bdg.pend{background:var(--vermelho-bg);color:var(--vermelho)}
.bdg.pago{background:var(--verde-bg);color:var(--verde)}
.bdg.cp{background:var(--vermelho);color:#fff}
.card-list{border-top:1px solid var(--borda);background:var(--cinza2);display:none}
.card.open .card-list{display:block}
.cl-row{padding:10px 15px;border-bottom:1px solid var(--borda);display:flex;flex-direction:column;gap:4px}
.cl-row:last-child{border-bottom:none}
.cl-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
.cl-meta{font-size:11px;color:var(--txt3);display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(20,30,45,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}
.ov.show{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:560px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface)}
.modal-h h3{font-size:16px;color:var(--azul)}
.modal-b{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:13px}
.modal-b .full{grid-column:1/3}
.modal-b .fld input,.modal-b .fld textarea,.modal-b .fld select{width:100%}
.modal-f{padding:14px 20px;border-top:1px solid var(--borda);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:var(--surface)}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--borda);background:var(--surface);color:var(--txt2)}
.btn.primary{background:var(--azul2);color:#fff;border-color:var(--azul2)}
.btn.primary:hover{background:#255d8a}
.xbtn{border:none;background:transparent;font-size:22px;cursor:pointer;color:var(--txt3);line-height:1}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c2128;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#1f8a4c}.toast.err{background:#c0392b}

.count{padding:6px 22px;font-size:12px;color:var(--txt3);background:var(--surface);border-bottom:1px solid var(--borda)}
.count b{color:var(--azul)}

@media(max-width:760px){
  .wrap{padding:10px 10px 60px}
  thead{display:none}
  table,tbody,tr,td{display:block;width:100%}
  tbody tr{border:1px solid var(--borda);border-radius:10px;margin-bottom:10px;padding:6px}
  tbody td{border:none;padding:6px 8px;display:flex;justify-content:space-between;gap:10px}
  tbody td::before{content:attr(data-l);font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase}
  .modal-b{grid-template-columns:1fr}.modal-b .full{grid-column:1}
  .stats{padding:10px}.controls{padding:10px;top:0;position:static}
  header{position:static}
}

/* LOGIN */
.login-ov{position:fixed;inset:0;background:linear-gradient(135deg,#16314e,#2d6a9f);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.login-box{background:var(--surface);border-radius:16px;padding:30px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.login-brand .mark{width:40px;height:40px;border-radius:9px;object-fit:cover;display:block;flex:none}
.login-brand h2{font-size:17px;color:var(--azul);line-height:1.15}
.login-brand .sub{font-size:11px;color:var(--txt3);margin-top:2px}
.login-box .fld{margin-bottom:13px}
.login-box .fld label{display:block;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.login-box .fld input{width:100%;border:1px solid var(--borda);border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--txt)}
.login-msg{display:none;background:var(--vermelho-bg);color:var(--vermelho);border:1px solid var(--vermelho-bg);border-radius:9px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;font-weight:600}

/* ===== MODO ESCURO ===== */
[data-theme="dark"]{
  --surface:#141c27;--surface2:#0e151e;--thead-bg:#1a2431;
  --txt:#e6ebf1;--txt2:#b6c0cb;--txt3:#8a95a2;
  --hover:#1a2431;--hover2:#232f3d;--pago-hover:#15301f;
  --azul:#8fbde8;--azul2:#4a90d9;
  --cinza:#0b111a;--borda:#2a3644;--cinza2:#161f2b;
  --pago-bg:#12261a;
}
[data-theme="dark"]{
  --azul-cl:#1b3550;
  --verde:#4ade80;--verde-bg:#153021;
  --laranja:#f59e42;--laranja-bg:#33220f;
  --marrom:#d9a06a;--marrom-bg:#2e1f10;
  --roxo:#b98ae8;--roxo-bg:#241733;
  --rosa:#e88ab4;--rosa-bg:#331624;
  --vermelho:#f87171;--vermelho-bg:#3a1615;
  --amarelo:#e3b341;--amarelo-bg:#2f2610;
}
[data-theme="dark"] header{background:linear-gradient(135deg,#0c1b2c,#1c3f63)}
[data-theme="dark"] .login-ov{background:linear-gradient(135deg,#0c1b2c,#1c3f63)}
[data-theme="dark"] .toast{background:#2a3644}
[data-theme="dark"] .chip.on{color:#0b111a}
[data-theme="dark"] .seg button.on{color:#0b111a}
[data-theme="dark"] .btn.primary{color:#0b111a}
[data-theme="dark"] .savep{color:#0b111a}
[data-theme="dark"] input[type=date]{color-scheme:dark}
[data-theme="dark"] .bdg.cp{color:#0b111a}
[data-theme="dark"] .stbtn.pend{background:var(--vermelho-bg);color:var(--vermelho);border-color:#5a2422}
[data-theme="dark"] .stbtn.pago{background:var(--verde-bg);color:var(--verde);border-color:#1f5133}

/* ===== NOVOS COMPONENTES ===== */
.finbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.finbar input[type=date]{border:1px solid var(--borda);border-radius:8px;padding:6px 9px;font-size:12px;background:var(--surface);color:var(--txt)}
.fincards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.fincard{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--borda);border-radius:12px;padding:13px 16px}
.fincard .fv{font-size:22px;font-weight:800;color:var(--verde);line-height:1.1}
.fincard .fl{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:700}
.fincard.n .fv{color:var(--azul)}
.grpsum{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.gsum{background:var(--surface);border:1px solid var(--borda);border-radius:9px;padding:7px 12px;font-size:12px}
.gsum b{display:block;font-size:14px;margin-top:2px}
.audit{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.audit b{color:var(--txt2)}
.logtbl{width:100%;border-collapse:collapse;font-size:12.5px}
.logtbl th{text-align:left;font-size:10px;text-transform:uppercase;color:var(--txt3);padding:7px 8px;border-bottom:1px solid var(--borda);letter-spacing:.4px}
.logtbl td{padding:7px 8px;border-bottom:1px solid var(--borda);vertical-align:top}
.logtbl tr:last-child td{border-bottom:none}
.logv{font-family:'SF Mono','Consolas',monospace;font-size:11.5px}
.logv .de{color:var(--vermelho);text-decoration:line-through;opacity:.75}
.logv .para{color:var(--verde);font-weight:700}
.logq{font-weight:700;color:var(--azul)}
.modal.big{max-width:820px}
.rc-list{border:1px solid var(--borda);border-radius:9px;overflow:hidden;margin-top:4px}
.rc-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-bottom:1px solid var(--borda);font-size:12.5px}
.rc-item:last-child{border-bottom:none}
.rc-item input{width:16px;height:16px;accent-color:var(--azul2);cursor:pointer}
.rc-item .p{flex:1;font-family:'SF Mono','Consolas',monospace;font-size:11.5px}
.rc-tot{display:flex;justify-content:space-between;align-items:center;background:var(--azul-cl);border-radius:9px;padding:10px 14px;margin-top:10px;font-weight:700;color:var(--azul)}
.rc-tot .v{font-size:18px;font-weight:800}
.hint{font-size:11px;color:var(--txt3);margin-top:3px}
.themebtn svg{width:15px;height:15px}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ CONFIGURAÇÃO DO SUPABASE — PREENCHA AS 2 LINHAS ABAIXO ============ */
const SUPABASE_URL      = "https://maytgfyzvoufepaerwwn.supabase.co";       /* <- cole o Project URL     */
const SUPABASE_ANON_KEY = "sb_publishable_U4pGdy1Bom36dZ2bo6nb3g_VMAAYELY";  /* <- cole a chave anon public */
/* ============================================================================== */

const MODE = "atendimento";
const isGestao = (MODE === "gestao");
const TABLE = isGestao ? "repasses" : "repasses_atendimento";

function _normUrl(u){
  u=(u||'').trim().replace(/\s+/g,'').replace(/^["']|["']$/g,'');
  var m=u.match(/dashboard\/project\/([a-z0-9]+)/i);
  if(m) return 'https://'+m[1]+'.supabase.co';
  u=u.replace(/\/(rest|auth|storage|realtime)(\/.*)?$/i,'');
  u=u.replace(/\/+$/,'');
  if(u && !/^https?:\/\//i.test(u)) u='https://'+u;
  return u;
}
const _URL=_normUrl(SUPABASE_URL), _KEY=(SUPABASE_ANON_KEY||'').trim().replace(/^["']|["']$/g,'');
const sb = (window.supabase && _URL.indexOf("COLE_AQUI") < 0)
  ? window.supabase.createClient(_URL, _KEY) : null;

let RECORDS = []; let pollT = null;

/* ---------- util ---------- */
const MESN={Jan:0,Fev:1,Mar:2,Abr:3,Mai:4,Jun:5,Jul:6,Ago:7,Set:8,Out:9,Nov:10,Dez:11};
const MESA=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const hoje=new Date();
function norm(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();}
function parseComp(c){const p=(c||'').split('/');return new Date(parseInt(p[1],10),MESN[p[0]]||0,1);}
function mesesPend(c){const d=parseComp(c);return (hoje.getFullYear()-d.getFullYear())*12+(hoje.getMonth()-d.getMonth());}
function tempoCls(m){if(m<=3)return'verde';if(m<=6)return'amarelo';if(m<=12)return'laranja';return'vermelho';}
function tempoLabel(m){if(m<0)return'A vencer';if(m===0)return'Este mês';if(m<12)return m+(m===1?' mês':' meses');const a=Math.floor(m/12),r=m%12;let t=a+(a===1?' ano':' anos');if(r>0)t+=' e '+r+(r===1?' mês':' meses');return t;}
function gcls(g){return {Max:'max',Mariah:'mariah',Jezieli:'jezieli',Yunes:'yunes',Kaled:'kaled',Nardon:'nardon',JLM:'jlm','Máximo Êxito':'me'}[g]||'max';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function brl(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseBR(s){return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;}
function fmtBR(v){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ---------- dados (Supabase) ---------- */
function getRecords(){return RECORDS;}
async function loadData(){
  if(!sb)return;
  const {data,error}=await sb.from(TABLE).select('*').order('nome',{ascending:true});
  if(error){toast('Erro ao carregar: '+error.message,'err');return;}
  RECORDS=data||[];
  buildFilterOptions();
  render();
}

/* ---------- filtros ---------- */
let filters={status:'todos',grupos:new Set(),cp:false,view:'flat',sort:{key:'nome',dir:1}};
function setStatus(s){filters.status=s;document.querySelectorAll('#segStatus button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));render();}
function setView(v){filters.view=v;document.querySelectorAll('#segView button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('finRow').style.display=(v==='fin')?'flex':'none';render();}
function toggleCP(){filters.cp=!filters.cp;document.getElementById('cpToggle').classList.toggle('on',filters.cp);render();}
function toggleGrupo(g){if(filters.grupos.has(g))filters.grupos.delete(g);else filters.grupos.add(g);render();}

function applyFilters(recs){
  const q=norm(document.getElementById('q').value.trim());
  const ano=document.getElementById('ano').value;
  const mes=document.getElementById('mes').value;
  return recs.filter(r=>{
    if(filters.status==='pendente'&&r.pago)return false;
    if(filters.status==='pago'&&!r.pago)return false;
    if(filters.grupos.size&&!filters.grupos.has(r.grupo))return false;
    if(filters.cp&&!r.cp)return false;
    if(ano&&String(r.ano)!==ano)return false;
    if(mes&&String(r.mes)!==mes)return false;
    if(q){const hay=(r.busca||norm(r.nome+' '+r.cpf+' '+r.processo+' '+r.reu));if(!hay.includes(q))return false;}
    return true;
  });
}

/* ---------- render ---------- */
function render(){
  const all=getRecords();
  const recs=applyFilters(all);
  renderStats(all);
  renderGroupChips(all);
  const wrap=document.getElementById('wrap');
  if(filters.view==='fin'){renderFin(recs,all);return;}
  document.getElementById('count').innerHTML='Exibindo <b>'+recs.length+'</b> de '+all.length+' lançamentos';
  if(!recs.length){wrap.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div>Nenhum lançamento encontrado com esses filtros.</div></div>';return;}
  if(filters.view==='cli')renderCards(recs);else renderFlat(recs);
}

function renderStats(all){
  const vis=applyFilters(all);
  const pend=vis.filter(r=>!r.pago);
  const pagos=vis.filter(r=>r.pago);
  const clientes=new Set(vis.map(r=>r.nome_norm)).size;
  const cps=vis.filter(r=>r.cp).length;
  let html='';
  if(isGestao){
    const totalPend=pend.reduce((s,r)=>s+(r.valor_num||parseBR(r.valor)),0);
    html+=card('money','A repassar (pendente)',brl(totalPend));
    html+=card('','Lançamentos',vis.length);
    html+=card('','Clientes',clientes);
    html+=card('ok','Pagos',pagos.length);
    html+=card('cp','C.P.',cps);
  }else{
    html+=card('','Lançamentos',vis.length);
    html+=card('','Clientes',clientes);
    html+=card('money','Pendentes',pend.length);
    html+=card('ok','Pagos',pagos.length);
    html+=card('cp','C.P.',cps);
  }
  document.getElementById('stats').innerHTML=html;
}
function card(cls,l,v){return '<div class="sc '+cls+'"><div class="sv">'+v+'</div><div class="sl">'+l+'</div></div>';}

const GORDER=['Max','Mariah','Jezieli','Yunes','Kaled','Nardon','JLM','Máximo Êxito'];
function renderGroupChips(all){
  const cont=document.getElementById('grpChips');
  const counts={};all.forEach(r=>counts[r.grupo]=(counts[r.grupo]||0)+1);
  let html='<span class="clabel">Grupos:</span>';
  GORDER.forEach(g=>{if(!counts[g])return;const on=filters.grupos.has(g);html+='<button class="chip '+gcls(g)+(on?' on':'')+'" onclick="toggleGrupo(\''+g.replace(/'/g,"\\'")+'\')">'+esc(g)+' <span class="ct">'+counts[g]+'</span></button>';});
  cont.innerHTML=html;
}

function sortRecs(recs){
  const k=filters.sort.key,d=filters.sort.dir;
  return recs.slice().sort((a,b)=>{
    let x,y;
    if(k==='valor'){x=a.valor_num||0;y=b.valor_num||0;}
    else if(k==='meses'){x=mesesPend(a.competencia);y=mesesPend(b.competencia);}
    else if(k==='comp'){x=parseComp(a.competencia).getTime();y=parseComp(b.competencia).getTime();}
    else{x=norm(String(a[k]||''));y=norm(String(b[k]||''));}
    if(x<y)return -1*d;if(x>y)return 1*d;return 0;
  });
}

async function saveModal(){
  const g=v('m_grupo');
  const mes=v('m_mes'),ano=v('m_ano');
  const comp=mes+'/'+ano;
  const advMap={Max:'Max',Mariah:'Mariah',Jezieli:'Jezieli',Yunes:'Yunes',Kaled:'Kaled',Nardon:'Max',JLM:'Max','Máximo Êxito':'Max'};
  const tipoMap={Nardon:'nardon',JLM:'jlm','Máximo Êxito':'maximo_exito'};
  const nome=v('m_nome').trim();
  if(!nome){toast('Informe o nome do cliente','err');return;}
  const rec={
    nome:nome, nome_norm:norm(nome), cpf:v('m_cpf').trim(), processo:v('m_processo').trim(),
    reu:v('m_reu').trim(), grupo:g, advogado:advMap[g]||g, tipo:tipoMap[g]||'cliente',
    competencia:comp, ano:parseInt(ano,10), mes:MESN[mes]+1,
    cp:document.getElementById('m_cp').checked, obs:v('m_obs').trim(),
    busca:norm(nome+' '+v('m_cpf')+' '+v('m_processo')+' '+v('m_reu'))
  };
  if(isGestao) rec.valor_num=parseBR(v('m_valor'));

function doExportJSON(){
  const blob=new Blob([JSON.stringify(RECORDS,null,2)],{type:'application/json'});
  dl(blob,(isGestao?'repasses_gestao':'repasses_atendimento')+'_backup_'+ymd()+'.json');
  toast('Backup gerado','ok');
}
function doExportCSV(){
  if(filters.view==='fin'){return exportFinCSV();}
  const recs=applyFilters(getRecords());
  let head=['Cliente','CPF','Processo','Reu','Grupo','Competencia'];
  if(isGestao){head=head.concat(['Tempo pendente','Valor','Valor pago','Data pagamento']);}
  head=head.concat(['Status','C.P.','Observacao']);
  const rows=[head];
  recs.forEach(r=>{
    let row=[r.nome,r.cpf,r.processo,r.reu,r.grupo,r.competencia];
    if(isGestao){row=row.concat([tempoLabel(mesesPend(r.competencia)),fmtBR(r.valor_num),r.valor_pago||'',r.data_pagamento||'']);}
    row=row.concat([r.pago?'PAGO':'PENDENTE',r.cp?'SIM':'',r.obs||'']);
    rows.push(row);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}),(isGestao?'repasses_gestao':'repasses_atendimento')+'_'+ymd()+'.csv');
  toast('CSV exportado','ok');
}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function ymd(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}

/* ---------- login / init ---------- */
async function boot(){
  const msg=document.getElementById('loginMsg');
  if(!sb){msg.textContent='Sistema ainda não configurado: falta preencher a URL e a chave do Supabase no arquivo HTML.';msg.style.display='block';return;}
  try{const {data:{session}}=await sb.auth.getSession(); if(session) onLogged();}catch(e){}
}
async function doLogin(){
  if(!sb)return;
  const email=(document.getElementById('loginEmail').value||'').trim();
  const senha=document.getElementById('loginSenha').value||'';
  const msg=document.getElementById('loginMsg'); msg.style.display='none';
  const {error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){msg.innerHTML='<b>Não foi possível entrar.</b><br>Detalhe técnico: '+((error&&error.message)||'erro desconhecido')+((error&&error.status)?' (código '+error.status+')':'');msg.style.display='block';try{console.log('Erro de login Supabase:',error);}catch(e){}return;}
  onLogged();
}
async function onLogged(){
  document.getElementById('loginOv').style.display='none';
  await loadData();
  if(pollT)clearInterval(pollT);
  pollT=setInterval(()=>{ if(canRefresh()) loadData(); },30000);
}
function canRefresh(){
  if(document.getElementById('ov').classList.contains('show'))return false;
  const a=document.activeElement;
  if(a&&(a.tagName==='TEXTAREA'||(a.tagName==='INPUT'&&a.id!=='q')))return false;
  return true;
}
async function doLogout(){ if(sb){try{await sb.auth.signOut();}catch(e){}} location.reload(); }

const THEME_KEY='mle_tema';
const _SVG_LUA='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const _SVG_SOL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>';
function initTheme(){
  let t=null;try{t=localStorage.getItem(THEME_KEY);}catch(e){}
  if(!t)t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
  applyTheme(t);
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const b=document.getElementById('themeBtn');
  if(b)b.innerHTML=(t==='dark')?(_SVG_SOL+'Claro'):(_SVG_LUA+'Escuro');
}
function toggleTheme(){
  const cur=(document.documentElement.getAttribute('data-theme')==='dark')?'dark':'light';
  const nt=(cur==='dark')?'light':'dark';
  try{localStorage.setItem(THEME_KEY,nt);}catch(e){}
  applyTheme(nt);
}

/* ================= VALOR POR EXTENSO ================= */
const _UNI=['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
const _DEZ=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
const _CEN=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
function _ate999(n){
  n=Math.floor(n);
  if(n<=0)return '';
  if(n===100)return 'cem';
  const partes=[];
  const c=Math.floor(n/100), r=n%100;
  if(c>0)partes.push(_CEN[c]);
  if(r>0){
    if(r<20)partes.push(_UNI[r]);
    else{const d=Math.floor(r/10),u=r%10;partes.push(_DEZ[d]+(u>0?' e '+_UNI[u]:''));}
  }
  return partes.join(' e ');
}
function _grupos(n){
  const bil=Math.floor(n/1e9), mi=Math.floor((n%1e9)/1e6), mil=Math.floor((n%1e6)/1000), un=n%1000;
  const partes=[];
  if(bil>0)partes.push({t:_ate999(bil)+(bil===1?' bilhão':' bilhões'),v:bil});
  if(mi>0)partes.push({t:_ate999(mi)+(mi===1?' milhão':' milhões'),v:mi});
  if(mil>0)partes.push({t:(mil===1?'mil':_ate999(mil)+' mil'),v:mil});
  if(un>0)partes.push({t:_ate999(un),v:un});
  if(!partes.length)return 'zero';
  if(partes.length===1)return partes[0].t;
  const ult=partes[partes.length-1];
  const liga=(ult.v<100||ult.v%100===0);
  return partes.slice(0,-1).map(p=>p.t).join(' ')+(liga?' e ':' ')+ult.t;
}
function extensoReais(v){
  v=Math.round(Number(v||0)*100)/100;
  const inteiro=Math.floor(v);
  const cent=Math.round((v-inteiro)*100);
  let s='';
  if(inteiro>0){
    const de=(inteiro>=1e6&&inteiro%1e6===0);
    s=_grupos(inteiro)+(inteiro===1?' real':(de?' de reais':' reais'));
  }
  if(cent>0){
    const c=_ate999(cent)+(cent===1?' centavo':' centavos');
    s=s?(s+' e '+c):c;
  }
  return s||'zero real';
}

const LOGTABLE=isGestao?'repasses_log':'repasses_log_atendimento';
const CAMPO_NOME={nome:'Cliente',cpf:'CPF',processo:'Processo',reu:'Réu',grupo:'Grupo',advogado:'Advogado',
  tipo:'Tipo',conta:'Conta',competencia:'Competência',ano:'Ano',mes:'Mês',valor_num:'Valor',cp:'C.P.',
  pago:'Status',data_pagamento:'Data do pagamento',valor_pago:'Valor pago',obs:'Observação',
  pix_chave:'Chave Pix',pix_banco:'Banco',pix_agencia:'Agência',pix_conta:'Conta corrente'};
function fmtDT(s){
  if(!s)return '';
  const d=new Date(s); if(isNaN(d.getTime()))return '';
  return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function auditHTML(r){
  const quem=r.atualizado_por||'';
  const quando=fmtDT(r.atualizado_em);
  const txt=quem?('Última alteração por <b>'+esc(quem)+'</b>'+(quando?(' em '+quando):'')):'Nenhuma alteração registrada ainda';
  return '<div class="fld" style="flex-basis:100%"><div class="audit">'+txt
    +' <button class="chip" style="padding:2px 9px;font-size:10.5px" onclick="openLog('+jid(r)+')">Ver histórico deste lançamento</button></div></div>';
}
function logVal(campo,v){
  if(v===''||v==null)return '—';
  if(campo==='cp')return (v==='true')?'Sim':'Não';
  if(campo==='pago')return (v==='true')?'PAGO':'PENDENTE';
  if(campo==='valor_num')return brl(parseFloat(v)||0);
  return String(v);
}
async function openLog(id){
  const ov=document.getElementById('ovLog');
  document.getElementById('logTitle').textContent=(id!=null&&id!==undefined)?'Histórico deste lançamento':'Histórico de alterações (últimas 150)';
  document.getElementById('logBody').innerHTML='<div class="hint">Carregando…</div>';
  ov.classList.add('show');
  if(!sb)return;
  let q=sb.from(LOGTABLE).select('*').order('quando',{ascending:false}).limit(id!=null?200:150);
  if(id!=null&&id!==undefined)q=q.eq('repasse_id',id);
  const {data,error}=await q;
  const body=document.getElementById('logBody');
  if(error){body.innerHTML='<div class="hint">Não foi possível carregar o histórico.<br>Detalhe: '+esc(error.message)+'<br><br>Se você ainda não rodou a atualização do banco (atualizacao-supabase.sql), rode primeiro.</div>';return;}
  if(!data||!data.length){body.innerHTML='<div class="hint">Nenhuma alteração registrada ainda. O histórico grava a partir do momento em que a atualização do banco foi aplicada.</div>';return;}
  let h='<table class="logtbl"><thead><tr><th>Quando</th><th>Quem</th><th>Cliente / processo</th><th>O que mudou</th></tr></thead><tbody>';
  data.forEach(l=>{
    let oque;
    if(l.acao==='criou')oque='<b>Criou</b> o lançamento';
    else if(l.acao==='excluiu')oque='<b>Excluiu</b> o lançamento';
    else oque='<b>'+esc(CAMPO_NOME[l.campo]||l.campo||'')+'</b>: <span class="logv"><span class="de">'+esc(logVal(l.campo,l.valor_antigo))+'</span> → <span class="para">'+esc(logVal(l.campo,l.valor_novo))+'</span></span>';
    h+='<tr><td style="white-space:nowrap">'+esc(fmtDT(l.quando))+'</td>'
      +'<td class="logq">'+esc(l.quem_nome||l.quem_email||'—')+'</td>'
      +'<td>'+esc(l.cliente||'')+'<br><span class="logv" style="color:var(--txt3)">'+esc(l.processo||'')+'</span></td>'
      +'<td>'+oque+'</td></tr>';
  });
  h+='</tbody></table>';
  body.innerHTML=h;
}
function closeLog(){document.getElementById('ovLog').classList.remove('show');}

/* ================= FINANCEIRO (só gestão) ================= */
function finPreset(p){
  const d=new Date();
  const iso=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  let de='',ate='';
  if(p==='mes'){de=iso(new Date(d.getFullYear(),d.getMonth(),1));ate=iso(new Date(d.getFullYear(),d.getMonth()+1,0));}
  else if(p==='ant'){de=iso(new Date(d.getFullYear(),d.getMonth()-1,1));ate=iso(new Date(d.getFullYear(),d.getMonth(),0));}
  else if(p==='ano'){de=iso(new Date(d.getFullYear(),0,1));ate=iso(new Date(d.getFullYear(),11,31));}
  document.getElementById('finDe').value=de;
  document.getElementById('finAte').value=ate;
  render();
}
function finRows(recs){
  const de=document.getElementById('finDe').value, ate=document.getElementById('finAte').value;
  return recs.filter(r=>{
    if(!r.pago)return false;
    const d=r.data_pagamento||'';
    if(de&&(!d||d<de))return false;
    if(ate&&(!d||d>ate))return false;
    return true;
  }).sort((a,b)=>String(b.data_pagamento||'').localeCompare(String(a.data_pagamento||'')));
}
function finValor(r){const vp=parseBR(r.valor_pago);return vp>0?vp:Number(r.valor_num||0);}
function renderFin(recs,all){
  if(!isGestao){document.getElementById('wrap').innerHTML='<div class="empty"><div>O controle financeiro está disponível apenas no acesso da gestão.</div></div>';document.getElementById('count').innerHTML='';return;}
  const rows=finRows(recs);
  const total=rows.reduce((s,r)=>s+finValor(r),0);
  const clientes=new Set(rows.map(r=>r.nome_norm)).size;
  const semData=recs.filter(r=>r.pago&&!r.data_pagamento).length;
  document.getElementById('count').innerHTML='Financeiro — <b>'+rows.length+'</b> lançamento(s) quitado(s) no período';
  let h='<div class="fincards">'
    +'<div class="fincard"><div class="fv">'+brl(total)+'</div><div class="fl">Total pago no período</div></div>'
    +'<div class="fincard n"><div class="fv">'+rows.length+'</div><div class="fl">Lançamentos quitados</div></div>'
    +'<div class="fincard n"><div class="fv">'+clientes+'</div><div class="fl">Clientes</div></div>'
    +'<div class="fincard n"><div class="fv">'+brl(rows.length?total/rows.length:0)+'</div><div class="fl">Valor médio</div></div>'
    +'</div>';
  const porG={};rows.forEach(r=>{porG[r.grupo]=(porG[r.grupo]||0)+finValor(r);});
  const gk=Object.keys(porG).sort((a,b)=>porG[b]-porG[a]);
  if(gk.length){
    h+='<div class="grpsum">';
    gk.forEach(g=>{h+='<div class="gsum"><span class="gtag g-'+gcls(g)+'">'+esc(g)+'</span><b class="mono">'+brl(porG[g])+'</b></div>';});
    h+='</div>';
  }
  if(semData)h+='<div class="hint" style="margin-bottom:10px">⚠ '+semData+' lançamento(s) marcado(s) como pago não têm data de pagamento preenchida e por isso ficam fora do filtro por período. Abra o lançamento e informe a data.</div>';
  if(!rows.length){
    h+='<div class="empty"><div>Nenhum pagamento encontrado nesse período.</div></div>';
    document.getElementById('wrap').innerHTML=h;return;
  }
  h+='<table><thead><tr><th class="nosort">Data do pagamento</th><th class="nosort">Cliente</th><th class="nosort">CPF</th><th class="nosort">Processo</th><th class="nosort">Grupo</th><th class="nosort">Competência</th><th class="nosort">Valor lançado</th><th class="nosort">Valor pago</th></tr></thead><tbody>';
  rows.forEach(r=>{
    h+='<tr><td data-l="Data do pagamento"><b>'+esc(dataBR(r.data_pagamento))+'</b></td>'
      +'<td data-l="Cliente"><span class="cli">'+esc(r.nome)+'</span></td>'
      +'<td data-l="CPF"><span class="cpf mono">'+esc(r.cpf||'—')+'</span></td>'
      +'<td data-l="Processo"><span class="proc mono">'+esc(r.processo)+'</span></td>'
      +'<td data-l="Grupo"><span class="gtag g-'+gcls(r.grupo)+'">'+esc(r.grupo)+'</span></td>'
      +'<td data-l="Competência">'+esc(r.competencia)+'</td>'
      +'<td data-l="Valor lançado"><span class="mono" style="color:var(--txt3)">'+brl(r.valor_num||0)+'</span></td>'
      +'<td data-l="Valor pago"><span class="val mono" style="color:var(--verde)">'+brl(finValor(r))+'</span></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('wrap').innerHTML=h;
}
function dataBR(s){
  if(!s)return '—';
  const p=String(s).split('-');
  return (p.length===3)?(p[2]+'/'+p[1]+'/'+p[0]):String(s);
}
function exportFinCSV(){
  const rows=finRows(applyFilters(getRecords()));
  const head=['Data do pagamento','Cliente','CPF','Processo','Reu','Grupo','Competencia','Valor lancado','Valor pago'];
  const out=[head];
  rows.forEach(r=>out.push([dataBR(r.data_pagamento),r.nome,r.cpf,r.processo,r.reu,r.grupo,r.competencia,fmtBR(r.valor_num),fmtBR(finValor(r))]));
  const total=rows.reduce((s,r)=>s+finValor(r),0);
  out.push([]);out.push(['TOTAL PAGO NO PERIODO','','','','','','','',fmtBR(total)]);
  const csv='\uFEFF'+out.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}),'financeiro_pagos_'+ymd()+'.csv');
  toast('CSV do financeiro exportado','ok');
}

/* ================= RECIBO DE QUITAÇÃO ================= */
let RECVALS={};
function closeRec(){document.getElementById('ovRec').classList.remove('show');}
function openRec(id){const r=findRec(id);if(!r)return;buildRec([r]);}
function openRecCliente(k){
  const ids=CARDMAP[k]||[];
  const list=ids.map(i=>findRec(i)).filter(Boolean);
  if(!list.length){toast('Nenhum lançamento encontrado','err');return;}
  buildRec(list);
}
async function recFetchVals(ids){
  if(isGestao){const m={};ids.forEach(i=>{const r=findRec(i);m[i]=Number((r&&r.valor_num)||0);});return m;}
  if(!sb)return null;
  const {data,error}=await sb.rpc('recibo_dados',{p_ids:ids.map(x=>Number(x))});
  if(error)return null;
  const m={};(data||[]).forEach(d=>{m[d.id]=Number(d.valor_num||0);});
  return m;
}
async function buildRec(list){
  const r=list[0];
  const pend=list.filter(x=>!x.pago);
  const marc=new Set((pend.length?pend:list).map(x=>String(x.id)));
  let procs='';
  list.forEach(x=>{
    procs+='<label class="rc-item"><input type="checkbox" data-id="'+x.id+'" '+(marc.has(String(x.id))?'checked':'')+' onchange="recTotal()">'
      +'<span class="p">'+esc(x.processo)+'</span>'
      +'<span style="color:var(--txt3);font-size:11px">'+esc(x.competencia)+'</span>'
      +(x.pago?'<span class="bdg pago">pago</span>':'')+'</label>';
  });
  const b=list.find(x=>x.pix_chave||x.pix_banco||x.pix_agencia||x.pix_conta)||{};
  document.getElementById('recTitle').textContent='Recibo de quitação — '+r.nome;
  document.getElementById('recBody').innerHTML=
     '<div class="fld"><label>Cliente</label><input id="rc_nome" value="'+esc(r.nome)+'"></div>'
    +'<div class="fld" style="margin-top:10px"><label>CPF/CNPJ</label><input id="rc_cpf" value="'+esc(r.cpf||'')+'" placeholder="000.000.000-00"></div>'
    +'<div class="fld" style="margin-top:10px"><label>Processos que entram no recibo</label><div class="rc-list">'+procs+'</div>'
    +'<div class="hint">Marcados = entram no recibo. Se marcar mais de um, o recibo sai com todos os processos e o valor total.</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">'
    +'<div class="fld" style="grid-column:1/3"><label>Chave Pix</label><input id="rc_pix" value="'+esc(b.pix_chave||'')+'" placeholder="CPF, telefone, e-mail ou chave aleatória"></div>'
    +'<div class="fld"><label>Banco</label><input id="rc_banco" value="'+esc(b.pix_banco||'')+'"></div>'
    +'<div class="fld"><label>Agência</label><input id="rc_ag" value="'+esc(b.pix_agencia||'')+'"></div>'
    +'<div class="fld" style="grid-column:1/3"><label>Conta Corrente</label><input id="rc_conta" value="'+esc(b.pix_conta||'')+'"></div>'
    +'</div>'
    +'<div class="rc-tot"><span>Valor total do recibo</span><span class="v mono" id="rc_total">carregando…</span></div>'
    +'<div class="hint">Os dados bancários ficam salvos no(s) lançamento(s) ao gerar o recibo.</div>';
  document.getElementById('ovRec').classList.add('show');
  const ids=list.map(x=>x.id);
  const m=await recFetchVals(ids);
  if(m===null){
    RECVALS={};
    document.getElementById('rc_total').textContent='indisponível';
    document.getElementById('rc_total').style.fontSize='13px';
  }else{RECVALS=m;}
  recTotal();
}
function recChecked(){return [].slice.call(document.querySelectorAll('#recBody .rc-item input:checked')).map(c=>c.getAttribute('data-id'));}
function recTotal(){
  const el=document.getElementById('rc_total');if(!el)return;
  if(!RECVALS||!Object.keys(RECVALS).length){return;}
  let t=0;recChecked().forEach(id=>{t+=Number(RECVALS[id]||0);});
  el.textContent=brl(t);
}
async function gerarRecibo(){
  const ids=recChecked();
  if(!ids.length){toast('Marque ao menos um processo','err');return;}
  const nome=(document.getElementById('rc_nome').value||'').trim();
  const cpf=(document.getElementById('rc_cpf').value||'').trim();
  if(!nome){toast('Informe o nome do cliente','err');return;}
  const pix={pix_chave:(document.getElementById('rc_pix').value||'').trim(),
             pix_banco:(document.getElementById('rc_banco').value||'').trim(),
             pix_agencia:(document.getElementById('rc_ag').value||'').trim(),
             pix_conta:(document.getElementById('rc_conta').value||'').trim()};
  let total=0;const procs=[];
  ids.forEach(id=>{const r=findRec(id);if(r)procs.push(r.processo);total+=Number((RECVALS||{})[id]||0);});
  if(!total&&!confirm('O valor total está zerado ou indisponível. Deseja gerar o recibo assim mesmo?'))return;
  for(let i=0;i<ids.length;i++){await persist(ids[i],pix);}
  ids.forEach(id=>{const r=findRec(id);if(r)Object.assign(r,pix);});
  abrirRecibo({nome:nome,cpf:cpf,procs:procs,total:total,pix:pix});
  closeRec();
  toast('Recibo gerado','ok');
}
function dataPorExtenso(){
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  return 'São Paulo, '+d.getDate()+' de '+M[d.getMonth()]+' de '+d.getFullYear()+'.';
}
